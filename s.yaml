# 阿里云 SAE 部署配置文件
# 使用 Serverless Devs 工具部署

edition: 1.0.0
name: alibaba-survey
access: "aliyun"  # 需要在本地配置阿里云账号

vars:
  region: "cn-hangzhou"  # 华东 1（杭州），可改为 cn-shenzhen 华南 1（深圳）
  service:
    name: "alibaba-survey-service"
    description: "阿里巴巴问卷系统服务"
  app:
    name: "alibaba-survey"
    description: "阿里巴巴相关业务调研问卷系统"
    runtime: "nodejs18"
    cpu: 0.25
    memory: 512
    instance: 1

services:
  alibaba-survey:
    component: sae
    module:
      source:
        type: git
        url: "https://github.com/katherinewai1998-ctrl/alibaba-survey.git"
        branch: main
        codeDir: "./"
    props:
      region: ${vars.region}
      service:
        name: ${vars.service.name}
        description: ${vars.service.description}
      app:
        name: ${vars.app.name}
        description: ${vars.app.description}
        runtime: ${vars.app.runtime}
        cpu: ${vars.app.cpu}
        memorySize: ${vars.app.memory}
        minInstances: ${vars.app.instance}
        maxInstances: 2
      package:
        type: "Image"
        url: "registry.cn-hangzhou.aliyuncs.com/acs/sae-ubuntu-nodejs18:latest"
      command: "node server/index.js"
      envs:
        NODE_ENV: "production"
        ADMIN_PASSWORD: "admin123"
        PORT: "8080"
      internet: "true"  # 开启公网访问
      healthCheck:
        path: "/health"
        initialDelaySeconds: 30
        timeoutSeconds: 5
        periodSeconds: 10
        successThreshold: 1
        failureThreshold: 3
      startup:
        command: "node server/index.js"
